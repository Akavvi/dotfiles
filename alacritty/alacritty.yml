shell:
  program: /usr/bin/fish

window:
  dynamic_padding: true
  decorations: full
  opacity: 0.9
  gtk_theme_variant: dark
font:
  normal:
    family: JetBrainsMono Nerd Font
  size: 10

colors:

  primary:
    foreground: '#D9E0EE'
    background: '#0f0f17'
  
  cursor:
    text: CellBackground
    cursor: CellForeground

  normal:
    black:   '#13141c'
    red:     '#F28FAD'
    green:   '#ABE9B3'
    yellow:  '#F8BD96'
    blue:    '#78aed3'
    magenta: '#E8A2AF'
    cyan:    '#89DCEB'
    white:   '#d3dced'

  bright:
    black:   '#646a73'
    red:     '#F28FAD'
    green:   '#ABE9B3'
    yellow:  '#F8BD96'
    blue:    '#78aed3'
    magenta: '#E8A2AF'
    cyan:    '#89DCEB'
    white:   '#bfc9db'

selection:

  save_to_clipboard: true

cursor:

  style:
    # Block | Beam | Underline
    shape: Block
    # Never | Off | On | Always
    blinking : on

  blink_interval: 750

  unfocused_hollow: true

  live_config_reload: true
